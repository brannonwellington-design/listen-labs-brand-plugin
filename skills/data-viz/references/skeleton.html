<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#F9F4EB">
  <title>Listen Labs / Chart Title</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { color-scheme: light dark; }
    :focus-visible {
      outline: 2px solid var(--content-primary);
      outline-offset: 2px;
    }

    /*
     * Brand tokens — Paper theme (default).
     *
     * Always populated from `get_css_variables(theme=<paper|whisp>, mode='both')`
     * at generation time. The values below are the current Paper light/dark
     * snapshot. To switch themes, replace both blocks with the output of
     * get_css_variables for the chosen theme. Token NAMES are identical across
     * themes — only values change.
     */
    :root {
      /* Paper - Light */
      --content-primary: #120F08;
      --content-secondary: #6B6861;
      --content-inverse-primary: #F9F4EB;
      --content-inverse-secondary: #9E9B94;
      --content-disabled: #B6B4AF;
      --content-inverse-disabled: #504E49;
      --content-brand: #0021CC;
      --content-brand-secondary: #7A85B8;
      --content-brand-contrast: #F9F4EB;
      --content-brand-contrast-secondary: #9CA3C9;
      --content-complimentary: #B88114;
      --content-warning: #B85814;
      --content-negative: #B82214;
      --content-positive: #0F8A38;

      --surface-highlight: #FBF9F4;
      --surface-primary: #F9F4EB;
      --surface-secondary: #EEE8DD;
      --surface-tertiary: #E2DCCF;
      --surface-inverse-primary: #120F08;
      --surface-inverse-secondary: #1F1B14;
      --surface-brand-primary: #0021CC;
      --surface-brand-secondary: #D9DDF2;
      --surface-complimentary-primary: #E5A119;
      --surface-complimentary-secondary: #F5EBD6;
      --surface-warning-primary: #CF6317;
      --surface-warning-secondary: #F5E3D6;
      --surface-negative-primary: #CF2617;
      --surface-negative-secondary: #F5D9D6;
      --surface-positive-primary: #14B84B;
      --surface-positive-secondary: #D6F5E0;

      /* Emotion tokens (shared across themes) */
      --emotion-anger-primary: #BF4040;
      --emotion-anger-secondary: rgba(191, 64, 64, 0.10);
      --emotion-happiness-primary: #D99E26;
      --emotion-happiness-secondary: rgba(217, 158, 38, 0.10);
      --emotion-disgust-primary: #80BF40;
      --emotion-disgust-secondary: rgba(128, 191, 64, 0.10);
      --emotion-surprise-primary: #40BFAA;
      --emotion-surprise-secondary: rgba(64, 191, 170, 0.10);
      --emotion-sadness-primary: #406ABF;
      --emotion-sadness-secondary: rgba(64, 106, 191, 0.10);
      --emotion-fear-primary: #9540BF;
      --emotion-fear-secondary: rgba(149, 64, 191, 0.10);
    }

    /*
     * Data-viz palette tokens — brand mode (default) and global mode.
     *
     * Token NAMES are identical across modes; only resolved values differ.
     * Charts swap modes by setting `data-dataviz-palette="brand"` or
     * `data-dataviz-palette="global"` on any ancestor (typically <main>).
     * Always populated from `get_dataviz_palettes(include_css=true)`.
     */
    :root,
    [data-dataviz-palette="brand"] {
      --dataviz-categorical-1: hsl(229, 100%, 40%);
      --dataviz-categorical-2: hsl(229, 100%, 60%);
      --dataviz-categorical-3: hsl(229, 100%, 25%);
      --dataviz-categorical-4: hsl(229, 100%, 78%);
      --dataviz-categorical-5: hsl(229, 100%, 50%);
      --dataviz-categorical-6: #525252;
      --dataviz-categorical-7: #8D8D8D;
      --dataviz-categorical-8: #C6C6C6;
      --dataviz-sequential-100: hsl(229, 100%, 92%);
      --dataviz-sequential-200: hsl(229, 100%, 82%);
      --dataviz-sequential-300: hsl(229, 100%, 70%);
      --dataviz-sequential-400: hsl(229, 100%, 55%);
      --dataviz-sequential-500: hsl(229, 100%, 40%);
      --dataviz-sequential-600: hsl(229, 100%, 28%);
      --dataviz-sequential-700: hsl(229, 100%, 18%);
      --dataviz-diverging-neg-3: hsl(27, 100%, 42%);
      --dataviz-diverging-neg-2: hsl(27, 100%, 62%);
      --dataviz-diverging-neg-1: hsl(27, 75%, 86%);
      --dataviz-diverging-zero: #F5F5F5;
      --dataviz-diverging-pos-1: hsl(229, 75%, 86%);
      --dataviz-diverging-pos-2: hsl(229, 100%, 62%);
      --dataviz-diverging-pos-3: #0021CC;
      --dataviz-highlight-accent: #0021CC;
      --dataviz-highlight-neutral-1: #525252;
      --dataviz-highlight-neutral-2: #8D8D8D;
      --dataviz-highlight-neutral-3: #C6C6C6;
      --dataviz-semantic-positive: #0F8A38;
      --dataviz-semantic-negative: #B82214;
      --dataviz-semantic-neutral: #8D8D8D;
    }

    [data-dataviz-palette="global"] {
      --dataviz-categorical-1: #0072B2;
      --dataviz-categorical-2: #E69F00;
      --dataviz-categorical-3: #009E73;
      --dataviz-categorical-4: #CC79A7;
      --dataviz-categorical-5: #56B4E9;
      --dataviz-categorical-6: #D55E00;
      --dataviz-categorical-7: #F0E442;
      --dataviz-categorical-8: #000000;
      --dataviz-sequential-100: #440154;
      --dataviz-sequential-200: #443A83;
      --dataviz-sequential-300: #31688E;
      --dataviz-sequential-400: #21908C;
      --dataviz-sequential-500: #35B779;
      --dataviz-sequential-600: #8FD744;
      --dataviz-sequential-700: #FDE725;
      --dataviz-diverging-neg-3: #B2182B;
      --dataviz-diverging-neg-2: #EF8A62;
      --dataviz-diverging-neg-1: #FDDBC7;
      --dataviz-diverging-zero: #F7F7F7;
      --dataviz-diverging-pos-1: #D1E5F0;
      --dataviz-diverging-pos-2: #67A9CF;
      --dataviz-diverging-pos-3: #2166AC;
      --dataviz-highlight-accent: #0072B2;
      --dataviz-highlight-neutral-1: #525252;
      --dataviz-highlight-neutral-2: #8D8D8D;
      --dataviz-highlight-neutral-3: #C6C6C6;
      --dataviz-semantic-positive: #0F8A38;
      --dataviz-semantic-negative: #B82214;
      --dataviz-semantic-neutral: #8D8D8D;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        /* Paper - Dark (only tokens that differ from light) */
        --content-primary: #F9F4EB;
        --content-secondary: #9E9B94;
        --content-inverse-primary: #120F08;
        --content-inverse-secondary: #6B6861;
        --content-disabled: #504E49;
        --content-inverse-disabled: #B6B4AF;
        --content-brand: #3354FF;

        --surface-highlight: #080603;
        --surface-primary: #130F06;
        --surface-secondary: #201C13;
        --surface-tertiary: #30291D;
        --surface-inverse-primary: #F9F4EB;
        --surface-inverse-secondary: #F0E9DB;
        --surface-brand-secondary: #131939;
      }

      /* Data-viz palette dark-mode overrides — only the tokens that need
         to flip for legibility on dark canvases. Token names unchanged. */
      :root,
      [data-dataviz-palette="brand"] {
        --dataviz-categorical-3: hsl(229, 100%, 72%);
        --dataviz-diverging-zero: var(--surface-tertiary);
      }
      [data-dataviz-palette="global"] {
        --dataviz-categorical-8: #FFFFFF;
        --dataviz-diverging-zero: var(--surface-tertiary);
      }
    }

    /* ── Base ──────────────────────────────────────────────── */
    body {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      background: var(--surface-primary);
      color: var(--content-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Branded Header ───────────────────────────────────── */
    .ll-header {
      text-align: center;
      position: absolute;
      top: 24px;
      left: 0;
      right: 0;
      font-size: 12px;
      font-weight: 400;
    }
    .ll-header .ll-brand { color: var(--content-secondary); }
    .ll-header .ll-title { color: var(--content-primary); }

    /* ── Chart Container ──────────────────────────────────── */
    main {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      padding: 80px 24px 48px;
    }

    figure {
      position: relative;
      width: 100%;
      height: 400px;
    }

    figcaption {
      font-size: 10px;
      color: var(--content-secondary);
      margin-top: 12px;
      text-align: center;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }

    /* ── Print ─────────────────────────────────────────────── */
    @media print {
      body { background: #fff; }
      .ll-header { position: static; margin-bottom: 24px; }
      main { padding-top: 0; }
    }

    /* ── Reduced Motion ────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0s !important; transition-duration: 0s !important; }
    }
  </style>
</head>
<body>

  <!-- Branded header -->
  <div class="ll-header">
    <span class="ll-brand">Listen Labs /</span>
    <span class="ll-title"> Chart Title</span>
  </div>

  <!--
    Palette mode: change `data-dataviz-palette` to "global" to swap every
    chart inside <main> from monochromatic brand-blue to the brand-agnostic
    best-practices palette (Okabe-Ito categorical, Viridis sequential,
    ColorBrewer RdBu diverging). Token names are identical across modes.
  -->
  <main data-dataviz-palette="brand">
    <figure>
      <canvas id="chart" role="img" aria-label="Description of the chart data"></canvas>
      <figcaption><!-- Optional caption --></figcaption>
    </figure>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script>
    // ── Disable animations globally ────────────────────────
    Chart.defaults.animation = false;

    // ── Read brand tokens from CSS variables ───────────────
    var style = getComputedStyle(document.documentElement);
    var brandBlue = style.getPropertyValue('--surface-brand-primary').trim();
    var contentPrimary = style.getPropertyValue('--content-primary').trim();
    var contentSecondary = style.getPropertyValue('--content-secondary').trim();
    var contentDisabled = style.getPropertyValue('--content-disabled').trim();

    // ── Global Chart.js defaults ───────────────────────────
    Chart.defaults.font.family = "'Inter', sans-serif";
    Chart.defaults.font.weight = 400;
    Chart.defaults.font.size = 12;
    Chart.defaults.color = contentPrimary;

    // ── Monochromatic shade generator ──────────────────────
    // Legacy: kept for backward compatibility. New charts should use
    // dataVizSeries() below — it reads --dataviz-* tokens and respects the
    // active palette mode (brand vs. global).
    function brandShades(count) {
      var shades = [];
      var step = 50 / (count + 1);
      for (var i = 0; i < count; i++) {
        var lightness = 30 + (step * (i + 1));
        shades.push('hsl(229, 100%, ' + lightness + '%)');
      }
      return shades;
    }

    // ── Palette-mode-aware helpers ─────────────────────────
    // All helpers resolve --dataviz-* tokens from the canvas's nearest
    // ancestor with `data-dataviz-palette`, falling back to :root. Swapping
    // the attribute on <main> flips every chart inside it between brand and
    // global without touching this code.
    function dataVizScope(el) {
      return (el && el.closest && el.closest('[data-dataviz-palette]')) || document.documentElement;
    }
    function dataVizToken(scope, name) {
      return getComputedStyle(scope).getPropertyValue(name).trim();
    }
    function dataVizSeries(count, el) {
      // Categorical palette. Soft cap 7, hard cap 10. Slots wrap past 8.
      var scope = dataVizScope(el);
      if (count > 10) {
        console.warn('dataVizSeries: ' + count + ' categories exceeds the hard cap (10). Roll up to "Other".');
      } else if (count > 7) {
        console.warn('dataVizSeries: ' + count + ' categories exceeds the soft cap (7). Add direct labels rather than relying on the legend.');
      }
      var out = [];
      for (var i = 0; i < count; i++) {
        var slot = (i % 8) + 1;
        out.push(dataVizToken(scope, '--dataviz-categorical-' + slot));
      }
      return out;
    }
    function dataVizSequential(count, el) {
      // Ordered/continuous data. Returns `count` evenly-spaced stops from
      // the 7-stop palette (100=lightest → 700=darkest).
      var scope = dataVizScope(el);
      var stops = [100, 200, 300, 400, 500, 600, 700];
      if (count >= 7) return stops.map(function(s){ return dataVizToken(scope, '--dataviz-sequential-' + s); });
      var picked = [];
      for (var i = 0; i < count; i++) {
        var idx = Math.round(i * (stops.length - 1) / Math.max(1, count - 1));
        picked.push(dataVizToken(scope, '--dataviz-sequential-' + stops[idx]));
      }
      return picked;
    }
    function dataVizDiverging(el) {
      // Symmetric 7-stop palette for data with a meaningful midpoint.
      var scope = dataVizScope(el);
      var keys = ['neg-3', 'neg-2', 'neg-1', 'zero', 'pos-1', 'pos-2', 'pos-3'];
      return keys.map(function(k){ return dataVizToken(scope, '--dataviz-diverging-' + k); });
    }
    function dataVizHighlight(el) {
      // "Spotlight" pattern: one accent + 3 neutral grays for de-emphasis.
      var scope = dataVizScope(el);
      return {
        accent:  dataVizToken(scope, '--dataviz-highlight-accent'),
        neutral: [
          dataVizToken(scope, '--dataviz-highlight-neutral-1'),
          dataVizToken(scope, '--dataviz-highlight-neutral-2'),
          dataVizToken(scope, '--dataviz-highlight-neutral-3'),
        ],
      };
    }
    function dataVizSemantic(el) {
      var scope = dataVizScope(el);
      return {
        positive: dataVizToken(scope, '--dataviz-semantic-positive'),
        negative: dataVizToken(scope, '--dataviz-semantic-negative'),
        neutral:  dataVizToken(scope, '--dataviz-semantic-neutral'),
      };
    }

    // ── Chart ──────────────────────────────────────────────
    var ctx = document.getElementById('chart').getContext('2d');
    var chart = new Chart(ctx, {
      type: 'bar', // or 'line'
      data: {
        labels: ['Label 1', 'Label 2', 'Label 3', 'Label 4'],
        datasets: [{
          label: 'Series 1',
          data: [10, 20, 30, 40],
          backgroundColor: brandBlue,
          borderColor: brandBlue,
          borderWidth: 1,
          borderRadius: 2,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: true,
            position: 'bottom',
            labels: {
              font: { family: "'Inter', sans-serif", weight: 400, size: 12 },
              color: contentPrimary,
              padding: 16,
              boxWidth: 12,
              boxHeight: 12,
              useBorderRadius: true,
              borderRadius: 2,
            }
          },
          tooltip: {
            backgroundColor: contentPrimary,
            titleColor: contentSecondary,
            bodyFont: { family: "'Inter', sans-serif", weight: 400, size: 12 },
            titleFont: { family: "'Inter', sans-serif", weight: 400, size: 10 },
            padding: 12,
            cornerRadius: 4,
            displayColors: true,
            boxWidth: 8,
            boxHeight: 8,
            boxPadding: 4,
          }
        },
        scales: {
          x: {
            grid: { display: false },
            border: { display: false },
            ticks: {
              font: { family: "'Inter', sans-serif", weight: 400, size: 10 },
              color: contentSecondary,
              padding: 8,
            }
          },
          y: {
            grid: {
              color: contentDisabled,
              lineWidth: 1,
              drawTicks: false,
            },
            border: { display: false },
            ticks: {
              font: { family: "'Inter', sans-serif", weight: 400, size: 10 },
              color: contentSecondary,
              padding: 8,
            }
          }
        }
      }
    });
  </script>

</body>
</html>
